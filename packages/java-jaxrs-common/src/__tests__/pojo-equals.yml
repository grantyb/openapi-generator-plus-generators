openapi: '3.0.3'
info:
  title: POJO equals test
  version: '1.0'
paths:
  /files:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileData'
      responses:
        200:
          description: OK
components:
  schemas:
    FileData:
      type: object
      properties:
        content:
          type: string
          format: binary
        name:
          type: string
